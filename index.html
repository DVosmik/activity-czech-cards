<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Activity – Česky</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; color: #e94560; }
    .filter-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 14px;
    }
    .filter-label {
      width: 100%;
      text-align: center;
      font-size: 0.8rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .toggle-btn {
      padding: 12px 20px;
      margin-top: 0;
      border-radius: 12px;
      border: 2px solid #e94560;
      font-size: 1rem;
      background: #16213e;
      color: #eee;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .toggle-btn.active {
      background: #e94560;
      color: #fff;
      font-weight: bold;
    }
    .toggle-btn:hover:not(.active) {
      background: #1f2f5a;
    }
    .card {
      background: #16213e;
      border-radius: 20px;
      padding: 50px 40px;
      text-align: center;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .card .category { font-size: 0.9rem; color: #e94560; text-transform: uppercase; letter-spacing: 2px; }
    .card .points { font-size: 0.9rem; color: #aaa; }
    .card .phrase { font-size: 2rem; font-weight: bold; color: #fff; }
    .card .empty { font-size: 1.2rem; color: #aaa; }
    .next-btn {
      margin-top: 24px;
      padding: 14px 36px;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      background: #e94560;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
    }
    .next-btn:hover { background: #c73652; }
  </style>
</head>
<body>
  <h1>🎲 Activity – Česky</h1>
  <div class="filter-group" id="categoryGroup">
    <div class="filter-label">Kategorie</div>
    <button class="toggle-btn active" aria-pressed="true" onclick="selectFilter('category', 'all', this)">Vše</button>
    <button class="toggle-btn" aria-pressed="false" onclick="selectFilter('category', 'Kreslení', this)">🎨 Kreslení</button>
    <button class="toggle-btn" aria-pressed="false" onclick="selectFilter('category', 'Pantomima', this)">🕺 Pantomima</button>
    <button class="toggle-btn" aria-pressed="false" onclick="selectFilter('category', 'Vysvětlování', this)">💬 Vysvětlování</button>
  </div>
  <div class="filter-group" id="pointsGroup">
    <div class="filter-label">Obtížnost</div>
    <button class="toggle-btn active" aria-pressed="true" onclick="selectFilter('points', 'all', this)">Vše</button>
    <button class="toggle-btn" aria-pressed="false" onclick="selectFilter('points', '3', this)">⭐ 3 body</button>
    <button class="toggle-btn" aria-pressed="false" onclick="selectFilter('points', '4', this)">⭐⭐ 4 body</button>
    <button class="toggle-btn" aria-pressed="false" onclick="selectFilter('points', '5', this)">⭐⭐⭐ 5 bodů</button>
    <button class="toggle-btn" aria-pressed="false" onclick="selectFilter('points', '6', this)">⭐⭐⭐⭐ 6 bodů</button>
  </div>
  <div class="card">
    <div class="category" id="cardCategory">–</div>
    <div class="phrase" id="cardPhrase">Stiskni tlačítko!</div>
    <div class="points" id="cardPoints">–</div>
  </div>
  <button class="next-btn" onclick="pickCard()">🃏 Další karta</button>

  <script>
    const files = [
      'data/kresleni_3body.json',
      'data/kresleni_4body.json',
      'data/kresleni_5body.json',
      'data/kresleni_6body.json',
      'data/pantomima_3body.json',
      'data/pantomima_4body.json',
      'data/pantomima_5body.json',
      'data/pantomima_6body.json',
      'data/vysvetlovani_3body.json',
      'data/vysvetlovani_4body.json',
      'data/vysvetlovani_5body.json',
      'data/vysvetlovani_6body.json',
    ];

    let allPhrases = [];
    let selectedCategory = 'all';
    let selectedPoints = 'all';

    function selectFilter(type, value, btn) {
      if (type === 'category') {
        selectedCategory = value;
        document.querySelectorAll('#categoryGroup .toggle-btn').forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-pressed', 'false');
        });
      } else {
        selectedPoints = value;
        document.querySelectorAll('#pointsGroup .toggle-btn').forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-pressed', 'false');
        });
      }
      btn.classList.add('active');
      btn.setAttribute('aria-pressed', 'true');
    }

    function pickCard() {
      let pool = allPhrases;
      if (selectedCategory !== 'all') pool = pool.filter(p => p.category === selectedCategory);
      if (selectedPoints !== 'all') pool = pool.filter(p => p.points === parseInt(selectedPoints));

      if (pool.length === 0) {
        document.getElementById('cardPhrase').textContent = 'Žádné karty nenalezeny!';
        document.getElementById('cardCategory').textContent = '–';
        document.getElementById('cardPoints').textContent = '–';
        return;
      }

      const card = pool[Math.floor(Math.random() * pool.length)];
      document.getElementById('cardPhrase').textContent = card.phrase;
      document.getElementById('cardCategory').textContent = card.category;
      const suffix = card.points >= 5 ? 'bodů' : 'body';
      document.getElementById('cardPoints').textContent = '⭐'.repeat(card.points) + ` (${card.points} ${suffix})`;
    }

    async function loadAll() {
      for (const file of files) {
        try {
          const res = await fetch(file);
          if (!res.ok) continue;
          const data = await res.json();
          data.phrases.forEach(p => allPhrases.push({
            phrase: p,
            category: data.category,
            points: data.points
          }));
        } catch(e) {}
      }
    }

    loadAll();
  </script>
</body>
</html>
