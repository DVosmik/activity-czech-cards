<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Activity – Česky</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; color: #e94560; }
    .filter-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 14px;
    }
    .filter-label {
      width: 100%;
      text-align: center;
      font-size: 0.8rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .toggle-btn {
      padding: 12px 20px;
      margin-top: 0;
      border-radius: 12px;
      border: 2px solid #e94560;
      font-size: 1rem;
      background: #16213e;
      color: #eee;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .toggle-btn.active {
      background: #e94560;
      color: #fff;
      font-weight: bold;
    }
    .toggle-btn:hover:not(.active) {
      background: #1f2f5a;
    }

    /* ── CARD ── */
    .card {
      background: #16213e;
      border-radius: 20px;
      padding: 30px 36px;
      text-align: center;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow: hidden;
    }

    /* category header strip */
    .card-header {
      background: #e94560;
      margin: -30px -36px 0 -36px;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 20px 20px 0 0;
    }
    .card-header .category {
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #fff;
    }
    .card-header .points {
      font-size: 0.85rem;
      color: #fff;
      opacity: 0.9;
    }

    /* word rows */
    .word-row {
      display: flex;
      align-items: center;
      padding: 13px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      gap: 14px;
    }
    .word-row:last-child { border-bottom: none; }
    .word-number {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #e94560;
      color: #fff;
      font-size: 0.8rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .word-text {
      font-size: 1.25rem;
      font-weight: 600;
      color: #fff;
      text-align: left;
    }

    .empty { font-size: 1.2rem; color: #aaa; padding: 40px 0; }

    .next-btn {
      margin-top: 24px;
      padding: 14px 36px;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      background: #e94560;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
    }
    .next-btn:hover { background: #c73652; }
  </style>
</head>
<body>
  <h1>🎲 Activity – Česky</h1>
  <div class="filter-group" id="categoryGroup">
    <div class="filter-label">Kategorie</div>
    <button class="toggle-btn active" aria-pressed="true" onclick="selectFilter('category', 'all', this)">Vše</button>
    <button class="toggle-btn" aria-pressed="false" onclick="selectFilter('category', 'Kreslení', this)">🎨 Kreslení</button>
    <button class="toggle-btn" aria-pressed="false" onclick="selectFilter('category', 'Pantomima', this)">🕺 Pantomima</button>
    <button class="toggle-btn" aria-pressed="false" onclick="selectFilter('category', 'Vysvětlování', this)">💬 Vysvětlování</button>
  </div>
  <div class="filter-group" id="pointsGroup">
    <div class="filter-label">Obtížnost</div>
    <button class="toggle-btn active" aria-pressed="true" onclick="selectFilter('points', 'all', this)">Vše</button>
    <button class="toggle-btn" aria-pressed="false" onclick="selectFilter('points', '3', this)">⭐ 3 body</button>
    <button class="toggle-btn" aria-pressed="false" onclick="selectFilter('points', '4', this)">⭐⭐ 4 body</button>
    <button class="toggle-btn" aria-pressed="false" onclick="selectFilter('points', '5', this)">⭐⭐⭐ 5 bodů</button>
    <button class="toggle-btn" aria-pressed="false" onclick="selectFilter('points', '6', this)">⭐⭐⭐⭐ 6 bodů</button>
  </div>

  <div class="card" id="card">
    <div class="card-header">
      <span class="category" id="cardCategory">–</span>
      <span class="points" id="cardPoints">–</span>
    </div>
    <div class="empty" id="cardEmpty">Stiskni tlačítko!</div>
    <div id="wordList"></div>
  </div>

  <button class="next-btn" onclick="pickCard()">🃏 Další karta</button>

  <script>
    const files = [
      'data/kresleni_3body.json',
      'data/kresleni_4body.json',
      'data/kresleni_5body.json',
      'data/kresleni_6body.json',
      'data/pantomima_3body.json',
      'data/pantomima_4body.json',
      'data/pantomima_5body.json',
      'data/pantomima_6body.json',
      'data/vysvetlovani_3body.json',
      'data/vysvetlovani_4body.json',
      'data/vysvetlovani_5body.json',
      'data/vysvetlovani_6body.json',
    ];

    let allPhrases = [];
    let selectedCategory = 'all';
    let selectedPoints = 'all';

    function selectFilter(type, value, btn) {
      if (type === 'category') {
        selectedCategory = value;
        document.querySelectorAll('#categoryGroup .toggle-btn').forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-pressed', 'false');
        });
      } else {
        selectedPoints = value;
        document.querySelectorAll('#pointsGroup .toggle-btn').forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-pressed', 'false');
        });
      }
      btn.classList.add('active');
      btn.setAttribute('aria-pressed', 'true');
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function pickCard() {
      let pool = allPhrases;
      if (selectedCategory !== 'all') pool = pool.filter(p => p.category === selectedCategory);
      if (selectedPoints !== 'all') pool = pool.filter(p => p.points === parseInt(selectedPoints));

      const wordListEl = document.getElementById('wordList');
      const emptyEl = document.getElementById('cardEmpty');
      const catEl = document.getElementById('cardCategory');
      const ptsEl = document.getElementById('cardPoints');

      if (pool.length === 0) {
        wordListEl.innerHTML = '';
        emptyEl.textContent = 'Žádné karty nenalezeny!';
        emptyEl.style.display = '';
        catEl.textContent = '–';
        ptsEl.textContent = '–';
        return;
      }

      // Pick one random entry to get category & points label, then pick 6 words from that same pool
      const sample = pool[Math.floor(Math.random() * pool.length)];
      const shuffled = shuffle([...pool]);
      const six = shuffled.slice(0, 6);

      catEl.textContent = sample.category;
      const pts = sample.points;
      const suffix = pts >= 5 ? 'bodů' : 'body';
      ptsEl.textContent = '⭐'.repeat(pts) + ` ${pts} ${suffix}`;

      emptyEl.style.display = 'none';
      wordListEl.innerHTML = six.map((item, i) =>
        `<div class="word-row">
          <div class="word-number">${i + 1}</div>
          <div class="word-text">${item.phrase}</div>
        </div>`
      ).join('');
    }

    async function loadAll() {
      for (const file of files) {
        try {
          const res = await fetch(file);
          if (!res.ok) continue;
          const data = await res.json();
          data.phrases.forEach(p => allPhrases.push({
            phrase: p,
            category: data.category,
            points: data.points
          }));
        } catch(e) {}
      }
    }

    loadAll();
  </script>
</body>
</html>
