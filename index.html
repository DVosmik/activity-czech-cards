<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>Activity – Česky</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; color: #e94560; }
    .filter-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 14px;
    }
    .filter-label {
      width: 100%;
      text-align: center;
      font-size: 0.8rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .toggle-btn {
      padding: 12px 20px;
      margin-top: 0;
      border-radius: 12px;
      border: 2px solid #e94560;
      font-size: 1rem;
      background: #16213e;
      color: #eee;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .toggle-btn.active {
      background: #e94560;
      color: #fff;
      font-weight: bold;
    }
    .toggle-btn:hover:not(.active) {
      background: #1f2f5a;
    }

    /* ── CARD ── */
    .card {
      background: #16213e;
      border-radius: 20px;
      padding: 30px 36px;
      text-align: center;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* word rows */
    .word-row {
      display: flex;
      align-items: center;
      padding: 13px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      gap: 14px;
    }
    .word-row:last-child { border-bottom: none; }
    .word-number {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      color: #fff;
      font-size: 0.8rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .word-number.n1 { background: #FFEB3B; color: #333; }
    .word-number.n2 { background: #03A9F4; }
    .word-number.n3 { background: #E91E63; }
    .word-number.n4 { background: #4CAF50; }
    .word-number.n5 { background: #1565C0; }
    .word-number.n6 { background: #FF9800; }
    .action-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
      flex-shrink: 0;
      min-width: 90px;
      text-align: left;
    }
    .word-text {
      font-size: 1.25rem;
      font-weight: 600;
      color: #fff;
      text-align: left;
    }
    .word-text.pink {
      color: #ff69b4;
    }

    .empty { font-size: 1.2rem; color: #aaa; padding: 40px 0; }

    .next-btn {
      margin-top: 24px;
      padding: 20px 48px;
      font-size: 1.4rem;
      border: none;
      border-radius: 14px;
      background: #e94560;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
    }
    .next-btn:hover { background: #c73652; }
    .version-footer {
      margin-top: 18px;
      font-size: 0.7rem;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>🎲 Activity – Česky</h1>
  <div class="filter-group" id="pointsGroup">
    <div class="filter-label">Obtížnost</div>
    <button class="toggle-btn active" aria-pressed="true" onclick="selectFilter('points', '3', this)">⭐ 3 body</button>
    <button class="toggle-btn" aria-pressed="false" onclick="selectFilter('points', '4', this)">⭐⭐ 4 body</button>
    <button class="toggle-btn" aria-pressed="false" onclick="selectFilter('points', '5', this)">⭐⭐⭐ 5 bodů</button>
    <button class="toggle-btn" aria-pressed="false" onclick="selectFilter('points', '6', this)">⭐⭐⭐⭐ 6 bodů</button>
  </div>

  <div class="card" id="card">
    <div class="empty" id="cardEmpty">🃏 Táhni kartu!</div>
    <div id="wordList"></div>
  </div>

  <button class="next-btn" onclick="pickCard()">🃏 Další karta</button>

  <div class="version-footer" id="versionFooter"></div>

  <script>
    const files = [
      'data/kresleni_3body.json',
      'data/kresleni_4body.json',
      'data/kresleni_5body.json',
      'data/kresleni_6body.json',
      'data/pantomima_3body.json',
      'data/pantomima_4body.json',
      'data/pantomima_5body.json',
      'data/pantomima_6body.json',
      'data/vysvetlovani_3body.json',
      'data/vysvetlovani_4body.json',
      'data/vysvetlovani_5body.json',
      'data/vysvetlovani_6body.json',
    ];

    let allPhrases = [];
    let selectedPoints = 3;
    let usedPhrases = new Set();

    /* Fixed card layout: 6 slots in order */
    const cardSlots = [
      { category: 'Kreslení',     icon: '🎨', label: 'Kreslení' },
      { category: 'Vysvětlování', icon: '💬', label: 'Vysvětlování' },
      { category: 'Pantomima',    icon: '🕺', label: 'Pantomima' },
      { category: 'Kreslení',     icon: '🎨', label: 'Kreslení' },
      { category: 'Vysvětlování', icon: '💬', label: 'Vysvětlování' },
      { category: 'Pantomima',    icon: '🕺', label: 'Pantomima' },
    ];

    function selectFilter(type, value, btn) {
      selectedPoints = parseInt(value);
      usedPhrases.clear();
      document.querySelectorAll('#pointsGroup .toggle-btn').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-pressed', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-pressed', 'true');
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function pickCard() {
      const pool = allPhrases.filter(p => p.points === selectedPoints);

      const wordListEl = document.getElementById('wordList');
      const emptyEl = document.getElementById('cardEmpty');

      /* Group by category, excluding already-used phrases */
      const byCategory = {};
      pool.forEach(p => {
        if (usedPhrases.has(p.category + '::' + p.phrase)) return;
        if (!byCategory[p.category]) byCategory[p.category] = [];
        byCategory[p.category].push(p);
      });

      /* Reset used phrases if any category is running low */
      const needed = { 'Kreslení': 2, 'Vysvětlování': 2, 'Pantomima': 2 };
      let shouldReset = false;
      for (const cat in needed) {
        if (!byCategory[cat] || byCategory[cat].length < needed[cat]) {
          shouldReset = true;
          break;
        }
      }
      if (shouldReset) {
        usedPhrases.clear();
        for (const cat in byCategory) byCategory[cat] = [];
        pool.forEach(p => {
          if (!byCategory[p.category]) byCategory[p.category] = [];
          byCategory[p.category].push(p);
        });
      }

      /* Shuffle each category */
      for (const cat in byCategory) shuffle(byCategory[cat]);

      /* Pick phrases for each slot */
      const picks = [];
      const used = { 'Kreslení': 0, 'Vysvětlování': 0, 'Pantomima': 0 };

      for (const slot of cardSlots) {
        const available = byCategory[slot.category];
        if (!available || used[slot.category] >= available.length) {
          picks.push(null);
        } else {
          picks.push(available[used[slot.category]]);
          used[slot.category]++;
        }
      }

      if (picks.some(p => p === null)) {
        wordListEl.innerHTML = '';
        emptyEl.textContent = 'Žádné karty nenalezeny!';
        emptyEl.style.display = '';
        return;
      }

      /* Mark picked phrases as used */
      picks.forEach(p => usedPhrases.add(p.category + '::' + p.phrase));

      /* Randomly pick one slot to highlight in pink */
      const pinkIndex = Math.floor(Math.random() * picks.length);

      emptyEl.style.display = 'none';
      wordListEl.innerHTML = picks.map((item, i) => {
        const slot = cardSlots[i];
        const pinkClass = i === pinkIndex ? ' pink' : '';
        return `<div class="word-row">
          <div class="word-number n${i + 1}">${i + 1}</div>
          <div class="action-label">${slot.icon} ${slot.label}</div>
          <div class="word-text${pinkClass}">${item.phrase}</div>
        </div>`;
      }).join('');
    }

    async function loadAll() {
      for (const file of files) {
        try {
          const res = await fetch(file);
          if (!res.ok) continue;
          const data = await res.json();
          data.phrases.forEach(p => allPhrases.push({
            phrase: p,
            category: data.category,
            points: data.points
          }));
        } catch(e) {}
      }
    }

    loadAll();

    // Show build version so users can verify they have the latest
    document.getElementById('versionFooter').textContent = 'v2026.04.08.2';
  </script>
</body>
</html>
